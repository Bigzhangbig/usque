name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom image tag (overrides auto-tag from ref)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.harvryhome.site
  # ghcr requires lowercase repo names; "Bigzhangbig" must be lowercased to "bigzhangbig".
  IMAGE_NAME: bigzhangbig/usque

jobs:
  build:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
          - platform: linux/arm/v7
            arch: arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.harvryhome.site
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          flavor: |
            latest=auto

      - name: Build and push (cache from registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:buildcache-${{ matrix.arch }},mode=max

  manifest:
    name: Manifest list (multi-arch)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to ghcr.harvryhome.site
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v4

      - name: Re-tag per-arch images as arch-suffixed
        run: |
          set -e
          TAGS="${{ needs.build.outputs.tags }}"
          for tag in $TAGS; do
            for entry in "linux-amd64=linux/amd64" "linux-arm64=linux/arm64" "linux-arm-v7=linux/arm/v7"; do
              suffix="${entry%%=*}"
              platform="${entry##*=}"
              crane cp \
                "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${tag}" \
                "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}-${suffix}:${tag}" \
                --platform "${platform}"
            done
          done

      - name: Verify manifest list
        run: |
          set -e
          crane manifest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:main" | jq .

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [build, manifest]
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Echo failure summary
        run: |
          echo "::error::usque Docker build/publish failed on ${{ github.ref_name }} (${{ github.sha }})"
          echo "Inspect: https://${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}"