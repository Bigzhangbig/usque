name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom image tag (overrides auto-tag from ref)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.harvryhome.site
  # ghcr requires lowercase repo names; "Bigzhangbig" must be lowercased to "bigzhangbig".
  IMAGE_NAME: bigzhangbig/usque

jobs:
  build:
    name: Build & Push (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.harvryhome.site
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve tag set
        id: tags
        run: |
          set -e
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          fi
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags:"
          for t in $(echo "${TAGS}" | tr ',' ' '); do echo "  - $t"; done

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=buildcache-multi
          cache-to: type=gha,mode=max,scope=buildcache-multi

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Echo failure summary
        run: |
          echo "::error::usque Docker build/publish failed on ${{ github.ref_name }} (${{ github.sha }})"
          echo "Inspect: https://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"